<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#fdfdf3" />
  <title>Performance Dashboard | Naan &amp; Co</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #fdfdf3;
      color: #171816;
      font-family: -apple-system, "Poppins", "Helvetica Neue", Arial, sans-serif;
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fdfdf3;
    }
    .loading {
      position: fixed;
      z-index: 2;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      background:
        radial-gradient(circle at 15% 18%, rgba(227, 3, 19, .12), transparent 32%),
        radial-gradient(circle at 85% 82%, rgba(26, 92, 67, .14), transparent 34%),
        #fdfdf3;
      transition: opacity .35s ease, visibility .35s ease;
    }
    .card {
      display: grid;
      gap: 12px;
      justify-items: center;
      width: min(360px, 100%);
      padding: 34px;
      border: 1px solid rgba(255, 255, 255, .9);
      border-radius: 28px;
      background: rgba(255, 255, 255, .52);
      box-shadow: 0 28px 70px rgba(47, 53, 49, .12), inset 0 1px 0 white;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .mark { width: 142px; height: 58px; object-fit: contain; }
    .eyebrow { color: #e30313; font-size: 9px; font-weight: 700; letter-spacing: 1.8px; }
    p { color: #6e6964; font-size: 13px; letter-spacing: .01em; }
    .pulse {
      width: 8px;
      height: 8px;
      margin-top: 6px;
      border-radius: 50%;
      background: #1a5c43;
      box-shadow: 0 0 0 7px rgba(26, 92, 67, .10);
      animation: breathe 1.4s ease-in-out infinite;
    }
    body.ready .loading { opacity: 0; visibility: hidden; pointer-events: none; }
    @keyframes breathe { 50% { transform: scale(.72); opacity: .55; } }
    @media (prefers-reduced-motion: reduce) { .pulse { animation: none; } .loading { transition: none; } }
  </style>
</head>
<body>
  <div class="loading" aria-live="polite">
    <div class="card">
      <img class="mark" src="assets/favicon.svg" alt="Naan &amp; Co" />
      <span class="eyebrow">N&amp;CO · PRIVATE OPERATIONS</span>
      <p>Opening the performance dashboard&hellip;</p>
      <span class="pulse" aria-hidden="true"></span>
    </div>
  </div>
  <iframe
    title="Naan &amp; Co performance dashboard"
    src="https://naanco-sales-performance.ronb00.chatgpt.site/?embedded=naanco#top"
    loading="eager"
    referrerpolicy="strict-origin-when-cross-origin"
    allow="clipboard-write"
  ></iframe>
  <script>
    const dashboard = document.querySelector("iframe");
    dashboard.addEventListener("load", () => document.body.classList.add("ready"), { once: true });
  </script>
  <noscript>This dashboard requires JavaScript.</noscript>
</body>
</html>
